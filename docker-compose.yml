services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pdreader-postgres
    environment:
      POSTGRES_DB: pdreader
      POSTGRES_USER: pdreader
      POSTGRES_PASSWORD: pdreader
    ports:
      - "5432:5432"
    volumes:
      - pdreader-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdreader -d pdreader"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pdreader-redis
    ports:
      - "6379:6379"
    volumes:
      - pdreader-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pdreader-postgres-data:
  pdreader-redis-data:
